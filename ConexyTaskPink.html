<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ConexyTask</title>
  <style>
    /* ==================== RESET & CORE ==================== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --accent: #6366f1;

      /* Priority Colors */
      --p-high-bg: #fef2f2;
      --p-high-border: #fecaca;
      --p-high-text: #991b1b;

      --p-med-bg: #fffbeb;
      --p-med-border: #fef3c7;
      --p-med-text: #92400e;

      --p-low-bg: #f0fdf4;
      --p-low-border: #dcfce7;
      --p-low-text: #166534;

      --shadow: 0 4px 12px rgba(0,0,0,0.03);
      --radius: 16px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      font-family: var(--font);
      background-color: var(--bg-body);
      color: var(--text-main);
      line-height: 1.5;
      padding: 24px 16px;
      display: flex;
      justify-content: center;
    }

    .container { max-width: 720px; width: 100%; animation: fadeIn 0.4s ease-out; }

    /* ==================== HEADER ==================== */
    header { margin-bottom: 24px; text-align: left; }
    .app-title { font-size: 1.5rem; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
    .app-subtitle { font-size: 0.85rem; color: var(--text-muted); }

    /* ==================== FORM ==================== */
    .form-container {
      background: var(--bg-card);
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 32px;
      border: 1px solid rgba(0,0,0,0.04);
    }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .full-width { grid-column: span 2; }

    label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; }

    .field {
      width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid #e2e8f0;
      background: #fdfdfd; font-family: inherit; font-size: 0.9rem; transition: 0.2s;
    }
    .field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }

    .btn {
      padding: 10px 16px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer;
      transition: 0.2s; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--accent); color: white; width: 100%; justify-content: center; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    /* ==================== TASK CARDS ==================== */
    .tasks-header { margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .tasks-title { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

    .task-card {
      background: var(--bg-card);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(0,0,0,0.05);
      display: flex;
      gap: 14px;
      transition: 0.3s ease;
    }

    /* Приоритеты */
    .task-card.priority-red { background: var(--p-high-bg); border-color: var(--p-high-border); }
    .task-card.priority-red .task-title { color: var(--p-high-text); }

    .task-card.priority-yellow { background: var(--p-med-bg); border-color: var(--p-med-border); }
    .task-card.priority-yellow .task-title { color: var(--p-med-text); }

    .task-card.priority-green { background: var(--p-low-bg); border-color: var(--p-low-border); }
    .task-card.priority-green .task-title { color: var(--p-low-text); }

    .task-card.completed { opacity: 0.5; filter: grayscale(0.5); }

    .task-checkbox {
      width: 22px; height: 22px; border-radius: 6px; border: 2px solid #cbd5e1;
      cursor: pointer; background: white; flex-shrink: 0; margin-top: 2px;
    }
    .task-checkbox.checked { background: var(--text-main); border-color: var(--text-main); position: relative; }
    .task-checkbox.checked::after { content: '✓'; color: white; font-size: 14px; position: absolute; left: 3px; top: -2px; }

    .task-info { flex: 1; min-width: 0; }
    .task-title { font-weight: 700; font-size: 1rem; margin-bottom: 2px; }
    .task-desc { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px; }

    .task-footer { display: flex; justify-content: space-between; align-items: center; }
    .badge-row { display: flex; gap: 6px; }
    .pill { padding: 2px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 600; background: rgba(0,0,0,0.05); }

    .action-btns { display: flex; gap: 8px; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 1rem; opacity: 0.5; transition: 0.2s; }
    .btn-icon:hover { opacity: 1; transform: scale(1.1); }

    /* ==================== TIMER BOX ==================== */
    .task-timer {
      margin-top: 12px; padding: 10px; background: rgba(255,255,255,0.5);
      border-radius: 12px; display: flex; align-items: center; justify-content: space-between;
    }
    .timer-display { font-family: monospace; font-weight: 700; font-size: 1.1rem; }

    /* ==================== UTILS ==================== */
    .message { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 10px; color: white; display: none; z-index: 1000; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* Fullscreen & Modals (Keep styles from original) */
    .fullscreen-timer { position: fixed; inset: 0; background: #0f172a; color: white; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
    .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 10000; align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 24px; border-radius: 20px; width: 90%; max-width: 360px; }
  </style>
</head>
<body>

<main class="container">
  <header>
    <h1 class="app-title">ConexyTask</h1>
    <p class="app-subtitle">Менеджер твоих достижений</p>
  </header>

  <div id="message" class="message"></div>

  <section class="form-container">
    <form id="taskForm">
      <div class="form-grid">
        <div class="full-width">
          <label>Название задачи</label>
          <input type="text" id="taskName" class="field" placeholder="Что нужно сделать?" required>
        </div>
        <div class="full-width">
          <label>Описание</label>
          <input type="text" id="taskDescription" class="field" placeholder="Детали (необязательно)">
        </div>
        <div>
          <label>Сложность</label>
          <select id="taskComplexity" class="field">
            <option value="1">1 - Легко</option>
            <option value="2" selected>2 - Средне</option>
            <option value="3">3 - Хард</option>
          </select>
        </div>
        <div>
          <label>Срочность</label>
          <select id="taskUrgency" class="field">
            <option value="1">1 - Свободно</option>
            <option value="2" selected>2 - Скоро</option>
            <option value="3">3 - Горит!</option>
          </select>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="submitBtn">Создать задачу</button>
    </form>
  </section>

  <section>
    <div class="tasks-header">
      <h2 class="tasks-title">Список дел</h2>
    </div>
    <div id="tasksList">Загрузка...</div>
  </section>
</main>

<div id="fullscreenTimer" class="fullscreen-timer">
  <div id="fullscreenTimerDisplay" style="font-size: 6rem; font-weight: 800; margin-bottom: 20px;">00:00</div>
  <div id="fullscreenTaskTitle" style="font-size: 1.5rem; opacity: 0.8; margin-bottom: 40px;">Задача</div>
  <div style="display:flex; gap: 15px;">
    <button class="btn" style="background: #334155; color: white;" onclick="fullscreenTogglePause()">Пауза</button>
    <button class="btn" style="background: #ef4444; color: white;" onclick="hideFullscreenTimer()">Закрыть</button>
  </div>
</div>

<div id="timerModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom: 16px;">⏱️ Время (мин)</h3>
    <input type="number" id="timerMinutes" class="field" value="25" style="margin-bottom: 16px;">
    <button class="btn btn-primary" onclick="startTimerFromModal()">Запустить</button>
    <button class="btn-icon" style="width: 100%; margin-top: 10px;" onclick="closeTimerModal()">Отмена</button>
  </div>
</div>

<script>
  // === КОНФИГ (Твой бэкенд здесь) ===
  const API_URL = (localStorage.getItem('apiUrl') || 'http://localhost:5221') + '/api/tasks';

  let editingTaskId = null;
  let completedTasks = JSON.parse(localStorage.getItem('completedTasks') || '{}');
  let timers = JSON.parse(localStorage.getItem('taskTimers') || '{}');
  let taskMeta = JSON.parse(localStorage.getItem('taskMeta') || '{}');
  let timerIntervals = {};
  let activeFullscreenTaskId = null;

  document.addEventListener('DOMContentLoaded', () => {
    loadTasks();
    // Перезапуск живых таймеров
    Object.keys(timers).forEach(id => { if(timers[id].running) startTimerInterval(id); });
  });

  async function loadTasks() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error();
      const tasks = await res.json();
      renderTasks(tasks);
    } catch (err) {
      document.getElementById('tasksList').innerHTML = '<p style="text-align:center; color:gray; font-size:0.8rem;">Ошибка подключения к бэкенду</p>';
    }
  }

  function renderTasks(tasks) {
    const container = document.getElementById('tasksList');

    // 1. Подготовка данных с расчетом веса (Умная сортировка)
    const sorted = tasks.map(t => {
      const meta = taskMeta[t.id] || { complexity: 2, urgency: 2 };
      return { ...t, meta, weight: (parseInt(meta.complexity) + parseInt(meta.urgency)) };
    }).sort((a, b) => b.weight - a.weight);

    container.innerHTML = sorted.map(t => {
      const isComp = completedTasks[t.id];
      const timer = timers[t.id];

      // Определение цвета
      let pClass = 'priority-green';
      if (t.weight >= 5) pClass = 'priority-red';
      else if (t.weight >= 3) pClass = 'priority-yellow';

      return `
                <div class="task-card ${pClass} ${isComp ? 'completed' : ''}" id="task-${t.id}">
                    <div class="task-checkbox ${isComp ? 'checked' : ''}" onclick="toggleComplete('${t.id}')"></div>
                    <div class="task-info">
                        <div class="task-title">${t.name}</div>
                        <div class="task-desc">${t.description || ''}</div>
                        <div class="task-footer">
                            <div class="badge-row">
                                <span class="pill">Сл: ${t.meta.complexity}</span>
                                <span class="pill">Ср: ${t.meta.urgency}</span>
                            </div>
                            <div class="action-btns">
                                <button class="btn-icon" onclick="openTimerModal('${t.id}')">⏱️</button>
                                <button class="btn-icon" onclick="editTask('${t.id}', '${t.name}', '${t.description || ''}')">✏️</button>
                                <button class="btn-icon" onclick="deleteTask('${t.id}')">🗑️</button>
                            </div>
                        </div>
                        ${timer ? `
                            <div class="task-timer">
                                <div class="timer-display" id="timer-display-${t.id}">${formatTime(timer.remaining)}</div>
                                <button class="btn" style="padding:4px 8px; font-size:0.7rem;" onclick="showFullscreenTimer('${t.id}')">РАЗВЕРНУТЬ</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
    }).join('');
  }

  // === ЛОГИКА ФОРМЫ (CRUD) ===
  document.getElementById('taskForm').onsubmit = async (e) => {
    e.preventDefault();
    const name = document.getElementById('taskName').value;
    const description = document.getElementById('taskDescription').value;
    const complexity = document.getElementById('taskComplexity').value;
    const urgency = document.getElementById('taskUrgency').value;

    try {
      const method = editingTaskId ? 'PUT' : 'POST';
      const url = editingTaskId ? `${API_URL}/${editingTaskId}` : API_URL;
      const body = { name, description };
      if(editingTaskId) body.id = editingTaskId;

      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        const result = editingTaskId ? { id: editingTaskId } : await res.json();
        taskMeta[result.id] = { complexity, urgency };
        localStorage.setItem('taskMeta', JSON.stringify(taskMeta));

        editingTaskId = null;
        document.getElementById('taskForm').reset();
        document.getElementById('submitBtn').textContent = 'Создать задачу';
        loadTasks();
        showMsg('Успешно');
      }
    } catch (e) { showMsg('Ошибка API', '#ef4444'); }
  };

  async function deleteTask(id) {
    if(!confirm('Удалить?')) return;
    await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
    delete taskMeta[id];
    delete timers[id];
    saveStore();
    loadTasks();
  }

  // === ТАЙМЕРЫ (KEEP WORKING) ===
  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function startTimerInterval(id) {
    if (timerIntervals[id]) clearInterval(timerIntervals[id]);
    timerIntervals[id] = setInterval(() => {
      if (!timers[id] || !timers[id].running) return clearInterval(timerIntervals[id]);
      timers[id].remaining--;
      if (timers[id].remaining <= 0) {
        timers[id].remaining = 0;
        timers[id].running = false;
        showMsg('⏰ Время вышло!', '#6366f1');
      }
      saveStore();
      const el = document.getElementById(`timer-display-${id}`);
      if (el) el.textContent = formatTime(timers[id].remaining);
      if (activeFullscreenTaskId === id) document.getElementById('fullscreenTimerDisplay').textContent = formatTime(timers[id].remaining);
    }, 1000);
  }

  let currentTimerId = null;
  function openTimerModal(id) { currentTimerId = id; document.getElementById('timerModal').style.display = 'flex'; }
  function closeTimerModal() { document.getElementById('timerModal').style.display = 'none'; }

  function startTimerFromModal() {
    const mins = document.getElementById('timerMinutes').value;
    timers[currentTimerId] = { remaining: mins * 60, running: true };
    saveStore();
    startTimerInterval(currentTimerId);
    closeTimerModal();
    loadTasks();
  }

  function showFullscreenTimer(id) {
    activeFullscreenTaskId = id;
    document.getElementById('fullscreenTaskTitle').textContent = document.querySelector(`#task-${id} .task-title`).textContent;
    document.getElementById('fullscreenTimer').style.display = 'flex';
  }
  function hideFullscreenTimer() { document.getElementById('fullscreenTimer').style.display = 'none'; activeFullscreenTaskId = null; }

  function toggleComplete(id) {
    completedTasks[id] = !completedTasks[id];
    saveStore();
    loadTasks();
  }

  function editTask(id, name, desc) {
    editingTaskId = id;
    document.getElementById('taskName').value = name;
    document.getElementById('taskDescription').value = desc;
    const m = taskMeta[id] || {complexity:2, urgency:2};
    document.getElementById('taskComplexity').value = m.complexity;
    document.getElementById('taskUrgency').value = m.urgency;
    document.getElementById('submitBtn').textContent = 'Обновить';
    window.scrollTo(0,0);
  }

  function saveStore() {
    localStorage.setItem('completedTasks', JSON.stringify(completedTasks));
    localStorage.setItem('taskTimers', JSON.stringify(timers));
    localStorage.setItem('taskMeta', JSON.stringify(taskMeta));
  }

  function showMsg(txt, color = '#22c55e') {
    const m = document.getElementById('message');
    m.textContent = txt; m.style.background = color; m.style.display = 'block';
    setTimeout(() => m.style.display = 'none', 2000);
  }
</script>
</body>
</html>
